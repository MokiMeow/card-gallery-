<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Mohith | Spherical Gallery</title>
  <meta name="description" content="Mohith's interactive spherical gallery of achievements and visual work." />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;700;800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>
  <!-- Loading screen -->
  <div id="loader">
    <div class="loader-label">Mohith | Selected Works</div>
    <div class="loader-num" id="loader-num">0</div>
    <div class="loader-bar"><div id="loader-bar-fill"></div></div>
  </div>

  <!-- Custom cursor -->
  <div id="cursor"><span>VIEW</span></div>

  <header class="site-header">
    <div class="logo">MOHITH</div>
    <nav class="menu" aria-label="Gallery navigation"><a href="/" data-hover>Galaxy</a><span aria-current="page">Gallery</span></nav>
  </header>

  <main id="app"></main>

  <!-- Ghost display type behind the UI -->
  <div id="ghost" aria-hidden="true"></div>

  <div class="vignette"></div>
  <div id="grain"></div>
  <div id="flash"></div>

  <div id="caption" class="caption">
    <span id="caption-index" class="caption-index"></span>
    <span class="caption-mask"><span id="caption-title" class="caption-title"></span></span>
  </div>

  <div class="hint">Drag or scroll to explore &middot; Click a card to open</div>

  <section id="detail" class="detail" aria-hidden="true">
    <button id="back" class="back-btn" data-hover>
      <span class="back-icon" aria-hidden="true">
        <svg viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="1.7">
          <path d="M16.5 10h-12" stroke-linecap="round" />
          <path d="m9 5.5-4.5 4.5L9 14.5" stroke-linecap="round" stroke-linejoin="round" />
        </svg>
      </span>
      <span class="back-label">Back to gallery</span>
    </button>
    <div class="detail-hero"><img id="detail-img" alt="Project hero" /></div>
    <div class="detail-inner">
      <p class="detail-kicker">Milestone</p>
      <h1 id="detail-title"></h1>
      <div class="detail-meta">
        <div><span>Client</span><strong id="meta-client"></strong></div>
        <div><span>Year</span><strong id="meta-year"></strong></div>
        <div><span>Role</span><strong id="meta-role"></strong></div>
        <div><span>Index</span><strong id="meta-index"></strong></div>
      </div>
      <p id="detail-description" class="detail-text"></p>
      <p id="detail-note" class="detail-text"></p>
      <button id="next" class="next-btn" data-hover>Next project &rarr;</button>
    </div>
  </section>

  <script type="importmap">
    { "imports": { "three": "https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js" } }
  </script>
  <script src="https://cdn.jsdelivr.net/npm/gsap@3.12.5/dist/gsap.min.js"></script>
  <script type="module" src="js/main.js"></script>
</body>
</html>
